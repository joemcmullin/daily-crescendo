<!doctype html><html><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  .stage{position:relative;width:1200px;height:630px;background:#06060a;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:34px}
  .stage:before{content:"";position:absolute;inset:0;
    background:radial-gradient(58% 60% at 14% -6%, rgba(123,90,232,.45), transparent 66%),
               radial-gradient(56% 72% at 102% 108%, rgba(52,224,180,.30), transparent 64%)}
  .grad{background:linear-gradient(110deg,#a78bff 0%,#34e0b4 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .brand{position:relative;display:flex;flex-direction:column;align-items:center;gap:22px}
  .word{font-size:74px;font-weight:700;letter-spacing:-.025em;color:#f5f5fa;line-height:1}
  .tag{position:relative;font-size:40px;font-weight:600;letter-spacing:-.02em;color:#c9c9d6;line-height:1}
  .sub{position:relative;font-size:23px;font-weight:500;color:#8a8a9a;letter-spacing:.01em;margin-top:-8px}
  .pill{position:relative;display:inline-flex;align-items:center;gap:9px;margin-top:6px;
    font-size:20px;font-weight:600;color:#aab;border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.05);padding:9px 18px;border-radius:999px}
  .pill i{width:9px;height:9px;border-radius:50%;background:#34e0b4;display:inline-block;box-shadow:0 0 10px 1px rgba(52,224,180,.7)}
</style></head>
<body><div class="stage">
  <div class="brand">
    <svg width="118" height="118" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="dc" x1="20" y1="66" x2="80" y2="34" gradientUnits="userSpaceOnUse"><stop stop-color="#a78bff"/><stop offset="1" stop-color="#34e0b4"/></linearGradient>
        <linearGradient id="ring" x1="6" y1="94" x2="94" y2="6" gradientUnits="userSpaceOnUse"><stop stop-color="#a78bff" stop-opacity=".8"/><stop offset="1" stop-color="#34e0b4" stop-opacity=".8"/></linearGradient>
      </defs>
      <rect x="1.75" y="1.75" width="96.5" height="96.5" rx="27" fill="#0b0b13" stroke="url(#ring)" stroke-width="1.75"/>
      <path d="M20 66 C26 66 26 54 32 54 C38 54 38 58 44 58 C50 58 50 44 56 44 C62 44 62 48 68 48 C74 48 74 34 80 34" stroke="url(#dc)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="word">Daily <span class="grad">Crescendo</span></div>
  </div>
  <div class="tag">Practice that <span class="grad">logs itself.</span></div>
  <div class="sub">On-device practice timer · AI session recaps · no subscription</div>
  <div class="pill"><i></i>Pre-launch · for people who actually practice</div>
</div></body></html>
